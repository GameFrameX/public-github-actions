name: Reusable Publish Historical Tags

on:
  workflow_call:
    inputs:
      tags:
        description: 'Comma-separated list of tags to publish (e.g. "1.0.0,1.0.1")'
        required: true
        type: string

jobs:
  publish-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://npm.cnb.cool/GameFrameX/npm/-/packages/'

      - name: Publish each tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CNB_NPM_TOKEN }}
        run: |
          IFS=',' read -ra TAGS <<< "${{ inputs.tags }}"
          sorted_tags=($(for t in "${TAGS[@]}"; do echo "$t"; done | sed 's/^[[:space:]]*//' | sort -t. -k1,1n -k2,2n -k3,3n))
          for tag in "${sorted_tags[@]}"; do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            echo "=== Publishing tag: $tag ==="
            git checkout "$tag"

            npm pkg fix

            npm publish --force 2>&1 && echo "=== Published $tag ===" && { git checkout -- .; continue; }
            
            echo "Normal publish failed, trying with --tag historical..."
            npm publish --force --tag historical 2>&1 && echo "=== Published $tag as historical ===" && { git checkout -- .; continue; }

            echo "=== FAILED to publish $tag ==="
            git checkout -- .
          done
