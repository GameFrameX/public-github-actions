name: Reusable Publish Historical Tags

on:
  workflow_call:
    inputs:
      tags:
        description: 'Comma-separated list of tags to publish (e.g. "1.0.0,1.0.1"). Leave empty to auto-detect all tags.'
        required: false
        type: string
        default: ''
jobs:
  publish-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://npm.cnb.cool/GameFrameX/npm/-/packages/'

      - name: Resolve tag list
        id: resolve-tags
        run: |
          if [ -n "${{ inputs.tags }}" ]; then
            echo "Using manually provided tags"
            echo "tag_list=${{ inputs.tags }}" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-detecting all tags from repository..."
            tags=$(git tag -l | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | sort -t. -k1,1n -k2,2n -k3,3n | tr '\n' ',' | sed 's/,$//')
            if [ -z "$tags" ]; then
              echo "::error::No semantic version tags found in repository"
              exit 1
            fi
            echo "Detected tags: $tags"
            echo "tag_list=$tags" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish each tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.CNB_NPM_TOKEN }}
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.resolve-tags.outputs.tag_list }}"
          sorted_tags=($(for t in "${TAGS[@]}"; do echo "$t"; done | sed 's/^[[:space:]]*//' | sort -t. -k1,1n -k2,2n -k3,3n))
          for tag in "${sorted_tags[@]}"; do
            tag=$(echo "$tag" | xargs)
            [ -z "$tag" ] && continue
            echo "=== Publishing tag: $tag ==="
            git checkout "$tag"

            npm pkg fix

            pkg_name='${{ github.event.repository.name }}'
            node -e "let pkg=require('./package.json'); pkg.name='$pkg_name'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2))"
            echo "Set package name to: $pkg_name"

            if npm publish --force 2>&1; then
              echo "=== Published $tag ==="
              git checkout -- .
              continue
            fi

            echo "Normal publish failed, trying with --tag historical..."
            if npm publish --force --tag historical 2>&1; then
              echo "=== Published $tag as historical ==="
              git checkout -- .
              continue
            fi

            echo "::warning::Failed to publish $tag, skipping..."
            git checkout -- .
          done
