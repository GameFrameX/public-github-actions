# 这个文件应该放在外部仓库的 .github/workflows/ 目录下

name: Reusable Sync to Gitee Workflow

on:
  workflow_call:
    inputs:
      target_branch:
        description: '目标分支名称'
        required: true
        type: string
      repository_name:
        description: '仓库名称 (格式: owner/repo)'
        required: true
        type: string

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 获取所有提交历史

      - name: Set up Git user
        run: |
          git config --global user.email "${{ vars.GIT_USER_EMAIL }}"
          git config --global user.name "${{ vars.GIT_USER_NAME }}"

      - name: Fetch repo info from GitHub
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME="${{ inputs.repository_name }}"
          REPO_ONLY="${REPO_NAME#*/}"
          echo "repo_name=${REPO_ONLY}" >> $GITHUB_OUTPUT

          # 从 GitHub 仓库获取 description、homepage、topics
          gh repo view "${REPO_NAME}" --json description,homepageUrl,repositoryTopics > /tmp/gh_repo.json

          DESC=$(python3 -c "import json; print(json.load(open('/tmp/gh_repo.json')).get('description', ''))")
          echo "description=${DESC}" >> $GITHUB_OUTPUT

          SITE_URL=$(python3 -c "import json; print(json.load(open('/tmp/gh_repo.json')).get('homepageUrl', ''))")
          echo "site_url=${SITE_URL}" >> $GITHUB_OUTPUT

          TOPICS_JSON=$(python3 -c "
          import json
          topics = [t.get('name', t) if isinstance(t, dict) else t for t in json.load(open('/tmp/gh_repo.json')).get('repositoryTopics', [])]
          print(json.dumps(topics))
          ")
          echo "topics_json=${TOPICS_JSON}" >> $GITHUB_OUTPUT

      - name: Ensure Gitee repo exists and setup
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_GITHUB_ACTION_SYNC_TOKEN }}
          REPO: ${{ steps.info.outputs.repo_name }}
          DESC: ${{ steps.info.outputs.description }}
          SITE_URL: ${{ steps.info.outputs.site_url }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "GITEE_GITHUB_ACTION_SYNC_TOKEN not configured, skipping repo init/setup"
            exit 0
          fi

          # Check if repo exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitee.com/api/v5/repos/GameFrameX/${REPO}?access_token=${GITEE_TOKEN}")

          if [ "$STATUS" != "200" ]; then
            echo "Creating Gitee repo: GameFrameX/${REPO}"
            BODY=$(python3 << 'PYEOF'
          import json, os
          print(json.dumps({
              "access_token": os.environ["GITEE_TOKEN"],
              "name": os.environ["REPO"],
              "description": os.environ.get("DESC", ""),
              "homepage": os.environ.get("SITE_URL", ""),
              "private": False,
              "auto_init": False
          }))
          PYEOF
            )
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://gitee.com/api/v5/orgs/GameFrameX/repos" \
              -H "Content-Type: application/json" \
              -d "$BODY")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
              echo "Warning: Gitee repo creation returned HTTP $HTTP_CODE"
              echo "$RESPONSE" | head -n -1
            fi
          else
            echo "Gitee repo GameFrameX/${REPO} already exists"
          fi

          # Update description and homepage (idempotent)
          echo "Updating Gitee repo info..."
          BODY=$(python3 << 'PYEOF'
          import json, os
          print(json.dumps({
              "access_token": os.environ["GITEE_TOKEN"],
              "name": os.environ["REPO"],
              "description": os.environ.get("DESC", ""),
              "homepage": os.environ.get("SITE_URL", "")
          }))
          PYEOF
          )
          curl -s -X PATCH \
            "https://gitee.com/api/v5/repos/GameFrameX/${REPO}" \
            -H "Content-Type: application/json" \
            -d "$BODY" > /dev/null || echo "Warning: Gitee repo update failed"

      - name: Set SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEE_ID_RSA }}" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s) && ssh-add ~/.ssh/id_rsa
          # 信任域名
          ssh-keyscan -H ${{ vars.GITEE_DOMAIN_URL }} >> ~/.ssh/known_hosts

      - name: Check current branch
        run: echo "当前分支：${{ inputs.target_branch }} ${{ inputs.repository_name }}"

      - name: Echo git url
        run: echo "git@${{ vars.GITEE_DOMAIN_URL }}:${{ inputs.repository_name }}.git"

      - name: Add remote url
        run: git remote add mirror "git@${{ vars.GITEE_DOMAIN_URL }}:${{ inputs.repository_name }}.git"

      - name: Fetch
        run: git fetch --prune mirror --tags --verbose

      - name: Pull and push
        run: |
          if [ "${{ inputs.target_branch }}" ]; then
            git checkout ${{ inputs.target_branch }}
            git push -f mirror ${{ inputs.target_branch }}
            git push -f mirror --tags --verbose
          fi

  sync-to-cnb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 获取所有提交历史

      - name: Fetch repo info from GitHub
        id: info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME="${{ inputs.repository_name }}"
          REPO_ONLY="${REPO_NAME#*/}"
          echo "repo_name=${REPO_ONLY}" >> $GITHUB_OUTPUT

          # 从 GitHub 仓库获取 description、homepage、topics
          gh repo view "${REPO_NAME}" --json description,homepageUrl,repositoryTopics > /tmp/gh_repo.json

          DESC=$(python3 -c "import json; print(json.load(open('/tmp/gh_repo.json')).get('description', ''))")
          echo "description=${DESC}" >> $GITHUB_OUTPUT

          SITE_URL=$(python3 -c "import json; print(json.load(open('/tmp/gh_repo.json')).get('homepageUrl', ''))")
          echo "site_url=${SITE_URL}" >> $GITHUB_OUTPUT

          TOPICS_JSON=$(python3 -c "
          import json
          topics = [t.get('name', t) if isinstance(t, dict) else t for t in json.load(open('/tmp/gh_repo.json')).get('repositoryTopics', [])]
          print(json.dumps(topics))
          ")
          echo "topics_json=${TOPICS_JSON}" >> $GITHUB_OUTPUT

      - name: Ensure CNB repo exists and setup
        env:
          CNB_TOKEN: ${{ secrets.CNB_SYNC_TOKEN }}
          REPO: ${{ steps.info.outputs.repo_name }}
          DESC: ${{ steps.info.outputs.description }}
          SITE_URL: ${{ steps.info.outputs.site_url }}
          TOPICS: ${{ steps.info.outputs.topics_json }}
        run: |
          if [ -z "$CNB_TOKEN" ]; then
            echo "CNB_SYNC_TOKEN not configured, skipping repo init/setup"
            exit 0
          fi

          # Check if repo exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${CNB_TOKEN}" \
            "https://api.cnb.cool/gameframex/${REPO}")

          if [ "$STATUS" != "200" ]; then
            echo "Creating CNB repo: gameframex/${REPO}"
            BODY=$(python3 << 'PYEOF'
          import json, os
          print(json.dumps({
              "name": os.environ["REPO"],
              "description": os.environ.get("DESC", ""),
              "visibility": "public"
          }))
          PYEOF
            )
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.cnb.cool/gameframex/-/repos" \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer ${CNB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$BODY")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
              echo "Warning: CNB repo creation returned HTTP $HTTP_CODE"
              echo "$RESPONSE" | head -n -1
            fi
          else
            echo "CNB repo gameframex/${REPO} already exists"
          fi

          # Update description, site_url, and topics (idempotent)
          echo "Updating CNB repo info..."
          BODY=$(python3 << 'PYEOF'
          import json, os
          print(json.dumps({
              "description": os.environ.get("DESC", ""),
              "site_url": os.environ.get("SITE_URL", ""),
              "topics": json.loads(os.environ.get("TOPICS", "[]"))
          }))
          PYEOF
          )
          curl -s -X PATCH \
            "https://api.cnb.cool/gameframex/${REPO}" \
            -H "Authorization: Bearer ${CNB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" > /dev/null || echo "Warning: CNB repo update failed"

      - name: Sync to CNB Repository
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: "https://cnb.cool/${{ inputs.repository_name }}.git"
          PLUGIN_AUTH_TYPE: "https"
          PLUGIN_USERNAME: "cnb"
          PLUGIN_PASSWORD: ${{ secrets.CNB_SYNC_TOKEN }}
          PLUGIN_FORCE: "true"
          PLUGIN_SYNC_MODE: "rebase"
          PLUGIN_PUSH_TAGS: "true"
